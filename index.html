<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imahe Photobooth</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain-overlay"></div>

    <div class="app-container">

        <header class="header">
            <div class="header-brand">
                <span class="brand-mark">✦</span>
                <h1>Imahe</h1>
                <span class="brand-mark">✦</span>
            </div>
            <p class="tagline">capture your cozy moments</p>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="single">
                <span class="mode-icon">⬜</span>
                <span>Single</span>
            </button>
            <button class="mode-btn" data-mode="strip">
                <span class="mode-icon">⬛⬛⬛</span>
                <span>Film Strip</span>
            </button>
        </div>

        <div class="shot-count-row" id="shot-count-row" style="display:none;">
            <p class="section-label" style="margin:0 10px 0 0;">Shots</p>
            <div class="shot-count-picker">
                <button class="shot-btn active" data-count="3">
                    <span class="shot-visual">
                        <span></span><span></span><span></span>
                    </span>
                    <span class="shot-label">3</span>
                </button>
                <button class="shot-btn" data-count="4">
                    <span class="shot-visual">
                        <span></span><span></span><span></span><span></span>
                    </span>
                    <span class="shot-label">4</span>
                </button>
                <button class="shot-btn" data-count="6">
                    <span class="shot-visual six">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </span>
                    <span class="shot-label">6</span>
                </button>
            </div>
        </div>

        <div class="camera-wrapper">
            <div class="camera-section">
                <video id="camera-feed" autoplay playsinline></video>
                <div class="countdown-overlay" id="countdown-overlay">
                    <span id="countdown-number"></span>
                </div>
                <div class="flash-overlay" id="flash-overlay"></div>
                <div class="vf-corner vf-tl"></div>
                <div class="vf-corner vf-tr"></div>
                <div class="vf-corner vf-bl"></div>
                <div class="vf-corner vf-br"></div>
                <div class="strip-progress" id="strip-progress" style="display:none;"></div>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="none">Normal</button>
            <button class="filter-btn" data-filter="warm">Warm</button>
            <button class="filter-btn" data-filter="cool">Cool</button>
            <button class="filter-btn" data-filter="mono">Mono</button>
            <button class="filter-btn" data-filter="fade">Fade</button>
        </div>

        <div class="frame-picker-section">
            <p class="section-label">Frame Style</p>
            <div class="frame-picker" id="frame-picker">
                <button class="frame-opt" data-frame="none" title="No Frame">
                    <div class="frame-preview fp-none"><div class="fp-photo"></div></div>
                    <span>None</span>
                </button>
                <button class="frame-opt active" data-frame="polaroid" title="Classic Polaroid">
                    <div class="frame-preview fp-polaroid"><div class="fp-photo"></div><div class="fp-bar"></div></div>
                    <span>Polaroid</span>
                </button>
                <button class="frame-opt" data-frame="minimal" title="Minimal Border">
                    <div class="frame-preview fp-minimal"><div class="fp-photo"></div></div>
                    <span>Minimal</span>
                </button>
                <button class="frame-opt" data-frame="dark" title="Dark Room">
                    <div class="frame-preview fp-dark"><div class="fp-photo"></div></div>
                    <span>Dark Room</span>
                </button>
                <button class="frame-opt" data-frame="doodle" title="Doodle">
                    <div class="frame-preview fp-doodle"><div class="fp-photo"></div></div>
                    <span>Doodle</span>
                </button>
                <button class="frame-opt" data-frame="stamp" title="Postcard Stamp">
                    <div class="frame-preview fp-stamp"><div class="fp-photo"></div><div class="fp-stamp-bar"></div></div>
                    <span>Postcard</span>
                </button>
                <button class="frame-opt" data-frame="vintage" title="Vintage Date">
                    <div class="frame-preview fp-vintage"><div class="fp-photo"></div><div class="fp-vintage-strip"></div></div>
                    <span>Vintage</span>
                </button>
            </div>
        </div>

        <div class="controls">
            <button id="capture-btn" class="btn-primary">
                <span class="shutter-icon"></span>
                <span id="btn-label">Take Photo</span>
            </button>
        </div>

        <canvas id="canvas" style="display:none;"></canvas>

        <div class="output-section" id="output-single" style="display:none;">
            <div id="single-frame-container"></div>
            <div class="output-actions">
                <button class="btn-secondary" id="retake-btn">Retake</button>
                <button class="btn-primary" id="download-btn">Save Photo</button>
                <button class="btn-secondary" id="print-btn">Print</button>
            </div>
        </div>

        <div class="output-section" id="output-strip" style="display:none;">
            <div id="strip-frame-container"></div>
            <div class="output-actions">
                <button class="btn-secondary" id="strip-retake-btn">Retake Strip</button>
                <button class="btn-primary" id="strip-download-btn">Save Strip</button>
                <button class="btn-secondary" id="strip-print-btn">Print</button>
            </div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
